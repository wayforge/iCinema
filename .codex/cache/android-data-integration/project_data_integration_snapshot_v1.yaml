project_data_integration_snapshot_v1:
  feature_status:
    - feature: "home"
      status: "real"
      entry: "HomeViewModel"
      notes: "HomeBizPort is repository-backed and drives category, list, pagination, and search requests."
      confidence: "verified"
    - feature: "detail"
      status: "real"
      entry: "DetailViewModel"
      notes: "DetailBizPort is repository-backed and resolves detail payload through ICmsRepository.getVideoDetail(videoId)."
      confidence: "verified"

  integration_flow:
    entry_points:
      - name: "HomeViewModel.handleIntent"
        layer: "viewmodel"
        path: "HomeViewModel -> HomeBizPort -> RepositoryHomeBizPort -> ICmsRepository -> CmsRepositoryImpl"
        confidence: "verified"
      - name: "DetailViewModel.handleIntent"
        layer: "viewmodel"
        path: "DetailViewModel -> DetailBizPort -> RepositoryDetailBizPort -> ICmsRepository -> CmsRepositoryImpl"
        confidence: "verified"
    stub_or_fake_boundaries:
      - name: "FakeDetailBizPort"
        replacement_target: "RepositoryDetailBizPort"
        confidence: "verified"
    remote_call_sites:
      - name: "CmsApiService.categoryList"
        layer: "api_service"
        confidence: "verified"
      - name: "CmsApiService.vodDetail"
        layer: "api_service"
        confidence: "verified"
    local_cache_sites:
      - name: "CategoryDao"
        role: "category cache"
        confidence: "verified"
    business_exposure_path:
      - "HomeViewModel"
      - "HomeBizPort"
      - "RepositoryHomeBizPort"
      - "ICmsRepository"
      - "CmsRepositoryImpl"
      - "CmsApiService"
      - "DetailViewModel"
      - "DetailBizPort"
      - "RepositoryDetailBizPort"
      - "ICmsRepository"
      - "CmsRepositoryImpl"
      - "CmsApiService"

  request_response_contracts:
    endpoint_usage_patterns:
      - endpoint: "GET api.php/provide/vod/?ac=list"
        modes:
          - mode: "category_list"
            trigger: "app launch or cache miss"
            confidence: "verified"
      - endpoint: "GET api.php/provide/vod/?ac=detail"
        modes:
          - mode: "video_list"
            trigger: "page only or page + categoryId"
            confidence: "verified"
          - mode: "search"
            trigger: "keyword + page"
            confidence: "verified"
          - mode: "detail"
            trigger: "videoId"
            confidence: "verified"
    request_patterns:
      - request_owner: "CmsRepositoryImpl.getCategoryList"
        parameter_source: "implicit app start"
        assembly_site: "CmsApiService.categoryList(ac=list, t=0)"
        confidence: "verified"
      - request_owner: "CmsRepositoryImpl.getVideoList"
        parameter_source: "page + selectedCategoryId + keyword"
        assembly_site: "CmsApiService.vodDetail(ac=detail, pg, t, wd)"
        confidence: "verified"
      - request_owner: "CmsRepositoryImpl.searchVideo"
        parameter_source: "search keyword + page"
        assembly_site: "CmsApiService.vodDetail(ac=detail, wd, pg)"
        confidence: "verified"
      - request_owner: "CmsRepositoryImpl.getVideoDetail"
        parameter_source: "detail videoId"
        assembly_site: "CmsApiService.vodDetail(ac=detail, ids)"
        confidence: "verified"
    success_judgement:
      - type: "business_code"
        rule: "response.code == 1"
        confidence: "verified"
      - type: "detail_non_empty"
        rule: "detail additionally requires response.list.isNotEmpty()"
        confidence: "verified"
    data_field_paths:
      - path: "classList|list"
        meaning: "category payload"
        confidence: "verified"
      - path: "list"
        meaning: "video list or detail payload"
        confidence: "verified"
    pagination_patterns:
      - fields: ["pg", "limit", "pagecount", "total"]
        style: "page_number"
        confidence: "verified"
    error_patterns:
      - fields: ["msg"]
        fallback: "Exception(response.msg ?: default message)"
        confidence: "verified"
    nullability_and_fallbacks:
      - field: "response.list"
        fallback: "emptyList() for list/search, failure for detail"
        confidence: "verified"
      - field: "response.classList"
        fallback: "response.list ?: emptyList()"
        confidence: "verified"

  mapping_and_injection:
    dto_to_domain_paths:
      - path: "VideoResponse -> data.model.Video -> domain.model.Video"
        confidence: "verified"
      - path: "CategoryResponse -> data.model.Category -> domain.model.Category"
        confidence: "verified"
      - path: "CategoryEntity -> data.model.Category -> domain.model.Category"
        confidence: "verified"
    entity_usage:
      - entity: "CategoryEntity"
        role: "persist visible category cache"
        confidence: "verified"
    mapper_locations:
      - symbol: "toData / toDomain"
        confidence: "verified"
    dependency_injection_path:
      - path: "ICinemaModule.provideCmsApiService -> ICinemaModule.provideCmsRepository -> HomeBindingsModule/DetailBindingsModule"
        confidence: "verified"
    reusable_examples:
      - name: "home"
        confidence: "verified"
      - name: "detail"
        confidence: "verified"

  implementation_evidence:
    key_files:
      - "/Users/Weihl/Documents/Project/wayforge/iCinema/app/src/main/java/com/icinema/data/api/CmsApiService.kt"
      - "/Users/Weihl/Documents/Project/wayforge/iCinema/app/src/main/java/com/icinema/data/repository/CmsRepositoryImpl.kt"
      - "/Users/Weihl/Documents/Project/wayforge/iCinema/app/src/main/java/com/icinema/di/ICinemaModule.kt"
      - "/Users/Weihl/Documents/Project/wayforge/iCinema/app/src/main/java/com/icinema/pages/home/HomeBizPort.kt"
      - "/Users/Weihl/Documents/Project/wayforge/iCinema/app/src/main/java/com/icinema/pages/detail/DetailBizPort.kt"
    key_symbols:
      - "CmsApiService"
      - "CmsRepositoryImpl"
      - "ICmsRepository"
      - "HomeBizPort"
      - "DetailBizPort"
    network_stack_notes:
      - "Retrofit + OkHttp + Gson"
    storage_stack_notes:
      - "Room CategoryDao cache for categories"
