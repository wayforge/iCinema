project_data_integration_snapshot_v1:
  feature_status:
    - feature: "home"
      status: "real"
      entry: "HomeViewModel"
      notes: "HomeBizPort is repository-backed and drives category, list, continue-watching, search, and recommendation requests."
      confidence: "verified"
    - feature: "detail"
      status: "real"
      entry: "DetailViewModel"
      notes: "DetailBizPort is repository-backed and now combines remote detail payload with local playback-history context to restore default source and episode selection."
      confidence: "verified"

  integration_flow:
    entry_points:
      - name: "HomeViewModel.handleIntent"
        layer: "viewmodel"
        path: "HomeViewModel -> HomeBizPort -> RepositoryHomeBizPort -> ICmsRepository -> CmsRepositoryImpl"
        confidence: "verified"
      - name: "DetailViewModel.loadVideo"
        layer: "viewmodel"
        path: "DetailViewModel -> DetailBizPort -> RepositoryDetailBizPort -> ICmsRepository -> CmsRepositoryImpl"
        confidence: "verified"
    stub_or_fake_boundaries:
      - name: "FakeDetailBizPort"
        replacement_target: "RepositoryDetailBizPort"
        confidence: "verified"
    remote_call_sites:
      - name: "CmsApiService.categoryList"
        layer: "api_service"
        confidence: "verified"
      - name: "CmsApiService.vodDetail"
        layer: "api_service"
        confidence: "verified"
    local_cache_sites:
      - name: "CategoryDao"
        role: "category cache"
        confidence: "verified"
      - name: "PlaybackHistoryDao"
        role: "resume context and continue-watching history"
        confidence: "verified"
    business_exposure_path:
      - "DetailViewModel"
      - "DetailBizPort"
      - "RepositoryDetailBizPort"
      - "ICmsRepository"
      - "CmsRepositoryImpl"
      - "CmsApiService"
      - "PlaybackHistoryDao"

  request_response_contracts:
    endpoint_usage_patterns:
      - endpoint: "GET api.php/provide/vod/?ac=detail"
        modes:
          - mode: "detail"
            trigger: "videoId"
            confidence: "verified"
      - endpoint: "PlaybackHistoryDao.getLatestHistoryForVideo(videoId)"
        modes:
          - mode: "latest_playback_context"
            trigger: "detail page enter"
            confidence: "verified"
    request_patterns:
      - request_owner: "CmsRepositoryImpl.getVideoDetail"
        parameter_source: "detail videoId"
        assembly_site: "CmsApiService.vodDetail(ac=detail, ids)"
        confidence: "verified"
      - request_owner: "CmsRepositoryImpl.getLatestPlaybackForVideo"
        parameter_source: "detail videoId"
        assembly_site: "PlaybackHistoryDao.getLatestHistoryForVideo(videoId)"
        confidence: "verified"
    success_judgement:
      - type: "business_code"
        rule: "response.code == 1"
        confidence: "verified"
      - type: "detail_non_empty"
        rule: "detail additionally requires response.list.isNotEmpty()"
        confidence: "verified"
      - type: "local_history_optional"
        rule: "missing playback history resolves to null and falls back to default detail selection"
        confidence: "verified"
    data_field_paths:
      - path: "response.list.first()"
        meaning: "detail payload"
        confidence: "verified"
      - path: "playback_history by videoId ordered by updatedAt desc limit 1"
        meaning: "latest resume context"
        confidence: "verified"
    error_patterns:
      - fields: ["msg"]
        fallback: "Exception(response.msg ?: default message)"
        confidence: "verified"
    nullability_and_fallbacks:
      - field: "latest playback history"
        fallback: "null -> default source and first available episode"
        confidence: "verified"
      - field: "invalid source or episode from history"
        fallback: "first available source and first available episode, silently"
        confidence: "verified"

  mapping_and_injection:
    dto_to_domain_paths:
      - path: "VideoResponse -> data.model.Video -> domain.model.Video"
        confidence: "verified"
      - path: "PlaybackHistoryEntity -> domain.model.WatchHistoryItem"
        confidence: "verified"
    entity_usage:
      - entity: "PlaybackHistoryEntity"
        role: "persist playback resume context per video/source/episode"
        confidence: "verified"
    mapper_locations:
      - symbol: "PlaybackHistoryEntity.toDomain"
        confidence: "verified"
      - symbol: "toData / toDomain"
        confidence: "verified"
    dependency_injection_path:
      - path: "DatabaseModule.providePlaybackHistoryDao -> ICinemaModule.provideCmsRepository -> DetailBindingsModule"
        confidence: "verified"
    reusable_examples:
      - name: "player resume flow"
        confidence: "verified"
      - name: "detail repository-backed BizPort"
        confidence: "verified"

  implementation_evidence:
    key_files:
      - "/Users/Ngai/Github/iCinema/app/src/main/java/com/icinema/data/local/dao/PlaybackHistoryDao.kt"
      - "/Users/Ngai/Github/iCinema/app/src/main/java/com/icinema/data/repository/CmsRepositoryImpl.kt"
      - "/Users/Ngai/Github/iCinema/app/src/main/java/com/icinema/pages/detail/DetailBizPort.kt"
      - "/Users/Ngai/Github/iCinema/app/src/main/java/com/icinema/pages/detail/DetailViewModel.kt"
    key_symbols:
      - "PlaybackHistoryDao.getLatestHistoryForVideo"
      - "ICmsRepository.getLatestPlaybackForVideo"
      - "RepositoryDetailBizPort.loadLatestPlayback"
      - "DetailViewModel.resolvePreferredSelection"
    network_stack_notes:
      - "Retrofit + OkHttp + Gson"
    storage_stack_notes:
      - "Room PlaybackHistoryDao + CategoryDao"
